upstream strapi {
    server 127.0.0.1:1337;
}

# Honor the upstream X-Forwarded-Proto header when set by a fronting load
# balancer (Azure Container Apps ingress sets it to "https" for external
# traffic, then forwards to this nginx over HTTP — so $scheme is "http"
# and overwriting with it would tell Strapi the connection is insecure,
# breaking the OAuth secure-cookie flow). Falls back to $scheme when no
# upstream header is present (e.g. local Docker testing).
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    root /app/frontend;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Static assets with long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve uploaded media directly from the persistent volume
    location /uploads/ {
        alias /data/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Strapi API, admin panel, and internal endpoints
    # `strapi-plugin-sso` is included so the OAuth callback URL
    # (/strapi-plugin-sso/azuread/callback) routes to Strapi, not the SPA.
    location ~ ^/(api|admin|_health|content-manager|content-type-builder|upload|users-permissions|i18n|email|strapi-plugin-sso)(/|$) {
        proxy_pass http://strapi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 50m;
    }

    # Frontend SPA fallback. NB: `$uri/` is intentionally omitted — with it
    # nginx treats trailing-slash URIs like /membership/ as directory
    # requests and returns 403 (no index, autoindex off) instead of falling
    # through to /index.html. Without `$uri/`, every non-asset path lands
    # on the SPA shell and React Router handles the route.
    location / {
        try_files $uri /index.html;
    }
}
