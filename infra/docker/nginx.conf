upstream strapi {
    server 127.0.0.1:1337;
}

server {
    listen 80;
    server_name _;

    root /app/frontend;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Static assets with long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve uploaded media directly from the persistent volume
    location /uploads/ {
        alias /data/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Strapi API, admin panel, and internal endpoints
    location ~ ^/(api|admin|_health|content-manager|content-type-builder|upload|users-permissions|i18n|email)(/|$) {
        proxy_pass http://strapi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 50m;
    }

    # Frontend SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
